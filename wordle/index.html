<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description"
        content="Neon Wordle — Guess the 5-letter word in 6 tries. Letters glow green, yellow, or stay dark.">
    <title>Wordle — Neon Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="top-bar">
            <a href="../index.html" id="back-link"><span>←</span> BACK TO ARCADE</a>
            <button id="mute-btn" aria-label="Toggle Sound" title="Toggle Sound">
                <span id="mute-icon">🔊</span><span class="mute-label">SFX</span>
            </button>
        </div>

        <header id="header">
            <h1 id="title">WORDLE</h1>
            <div id="subtitle">NEON EDITION</div>
        </header>

        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">PLAYED</span>
                <span class="hud-value" id="played-val">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">WIN %</span>
                <span class="hud-value" id="win-val">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">STREAK</span>
                <span class="hud-value" id="streak-val">0</span>
            </div>
        </div>

        <div id="board"></div>

        <div id="message" class="hidden"></div>

        <div id="keyboard"></div>

        <div id="controls-hint"><span>Type or tap letters — press Enter to submit</span></div>
        <footer id="footer">
            <p>Guess the word in 6 tries</p>
            <p style="margin-top:6px;font-size:0.75rem;opacity:0.6;">Created by Mahammed Anfal Kurka</p>
        </footer>
    </div>

    <script src="../sfx.js"></script>
    <script src="../bug-report.js"></script>
    <script src="game.js"></script>
</body>

</html>
