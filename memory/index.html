<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Neon Memory Match — Flip glowing cards and find matching pairs. Test your memory under pressure.">
    <title>Memory Match — Neon Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="top-bar">
            <a href="../index.html" id="back-link"><span>←</span> BACK TO ARCADE</a>
            <button id="mute-btn" aria-label="Toggle Sound" title="Toggle Sound">
                <span id="mute-icon">🔊</span><span class="mute-label">SFX</span>
            </button>
        </div>

        <header id="header">
            <h1 id="title">MEMORY MATCH</h1>
            <div id="subtitle">NEON EDITION</div>
        </header>

        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">MOVES</span>
                <span class="hud-value" id="moves-val">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">PAIRS</span>
                <span class="hud-value" id="pairs-val">0/8</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">TIME</span>
                <span class="hud-value" id="time-val">0:00</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">BEST</span>
                <span class="hud-value" id="best-val">—</span>
            </div>
        </div>

        <div id="board"></div>

        <div id="overlay">
            <div id="overlay-content">
                <div id="overlay-icon">🃏</div>
                <h2 id="overlay-title">Memory Match</h2>
                <p id="overlay-info">Flip cards and find matching pairs<br>Fewer moves = better score!</p>
                <button id="play-btn" class="neon-btn">START GAME</button>
            </div>
        </div>

        <div id="controls-hint"><span>Click or tap cards to flip them</span></div>
        <footer id="footer">
            <p>Find all pairs to win</p>
            <p style="margin-top:6px;font-size:0.75rem;opacity:0.6;">Created by Mahammed Anfal Kurka</p>
        </footer>
    </div>

    <script src="../sfx.js"></script>
    <script src="game.js"></script>
</body>

</html>
