<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description"
        content="Neon Simon Says — Repeat the glowing color sequence. How far can your memory take you?">
    <title>Simon Says — Neon Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="top-bar">
            <a href="../index.html" id="back-link"><span>←</span> BACK TO ARCADE</a>
            <button id="mute-btn" aria-label="Toggle Sound" title="Toggle Sound">
                <span id="mute-icon">🔊</span><span class="mute-label">SFX</span>
            </button>
        </div>

        <header id="header">
            <h1 id="title">SIMON SAYS</h1>
            <div id="subtitle">NEON EDITION</div>
        </header>

        <!-- Mode selector -->
        <div id="mode-selector">
            <button class="mode-btn active" data-mode="solo" id="mode-solo">SOLO</button>
            <button class="mode-btn" data-mode="online" id="mode-online">ONLINE</button>
        </div>

        <!-- Difficulty selector -->
        <div id="diff-selector">
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn active" data-diff="medium">MEDIUM</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
        </div>

        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">ROUND</span>
                <span class="hud-value" id="round-val">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">BEST</span>
                <span class="hud-value" id="best-val">0</span>
            </div>
            <div class="hud-item hud-online hidden">
                <span class="hud-label">OPPONENT</span>
                <span class="hud-value" id="opp-round-val">0</span>
            </div>
        </div>

        <!-- Online Panel -->
        <div id="online-panel" class="hidden">
            <div id="online-lobby">
                <button id="create-room-btn" class="neon-btn-sm">CREATE ROOM</button>
                <div class="join-row">
                    <input type="text" id="room-code-input" placeholder="CODE" maxlength="5" />
                    <button id="join-room-btn" class="neon-btn-sm">JOIN</button>
                </div>
            </div>
            <div id="online-waiting" class="hidden">
                <p id="waiting-text">Creating room...</p>
                <div id="room-code-display" class="hidden" style="margin-top:8px;">
                    <span>Room Code: </span><strong id="room-code"></strong>
                    <button id="copy-code-btn" title="Copy Invite Link">🔗</button>
                </div>
                <p id="share-hint" class="hidden" style="font-size:0.55rem;margin-top:4px;color:rgba(228,228,240,0.4);">
                    Share the link to invite a friend</p>
                <button id="cancel-online-btn" class="neon-btn-sm"
                    style="margin-top:10px;border-color:rgba(255,45,117,0.4);color:#ff2d75;">CANCEL</button>
            </div>
            <div id="online-connected" class="hidden">
                <p style="color:#00ff88;">✓ Opponent connected!</p>
                <button id="disconnect-btn" class="neon-btn-sm hidden"
                    style="margin-top:6px;border-color:rgba(255,45,117,0.4);color:#ff2d75;">DISCONNECT</button>
            </div>
        </div>

        <div id="board">
            <button class="simon-btn" id="btn-0" data-index="0"></button>
            <button class="simon-btn" id="btn-1" data-index="1"></button>
            <button class="simon-btn" id="btn-2" data-index="2"></button>
            <button class="simon-btn" id="btn-3" data-index="3"></button>
        </div>

        <div id="status" class="status-text">Press START to begin</div>

        <button id="start-btn" class="neon-btn">START</button>

        <footer id="footer">
            <p>Watch the pattern, repeat it back — how far can you go?</p>
            <p style="margin-top:6px;font-size:0.75rem;opacity:0.6;">Created by Mahammed Anfal Kurka</p>
        </footer>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="../sfx.js"></script>
    <script src="../leaderboard.js"></script>
    <script src="../bug-report.js"></script>
    <script src="game.js"></script>
</body>

</html>
